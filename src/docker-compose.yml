services:
  tor:
    container_name: tor
    build:
      context: ./tor
      dockerfile: ./Dockerfile
      target: run
  nginx:
    container_name: nginx
    build:
      context: ./nginx
      dockerfile: ./Dockerfile
      target: openresty-gixy
  express:
    container_name: express
    restart: on-failure
    build:
      context: ./express
      dockerfile: ./Dockerfile
      target: run
  mongo-init:
    extends: mongo
    restart: on-failure
    build:
      context: ./mongo
      dockerfile: ./Dockerfile
      target: init
    # Doesn't affect /proc/sys/vm/swappiness
    mem_swappiness: 1
    # https://www.mongodb.com/docs/manual/tutorial/manage-mongodb-processes/#stop-mongod-processes
    stop_signal: SIGTERM
    configs:
      - source: mongo-replicas
        target: /project/replicas.json
    secrets:
      - source: mongo-keyfile
        target: /run/secrets/keyFile.pem
        mode: 0400
        uid: '999'
        gid: '999'
      - source: mongo-root-username
        target: /run/secrets/username.txt
      - source: mongo-root-password
        target: /run/secrets/password.txt
  mongo:
    restart: unless-stopped
    build:
      context: ./mongo
      dockerfile: ./Dockerfile
      target: run
    # Doesn't affect /proc/sys/vm/swappiness
    mem_swappiness: 1
    # https://www.mongodb.com/docs/manual/tutorial/manage-mongodb-processes/#stop-mongod-processes
    stop_signal: SIGTERM
    secrets:
      - source: mongo-keyfile
        target: /run/secrets/keyFile.pem
        mode: 0400
        uid: '999'
        gid: '999'
      - source: mongo-config
        target: /run/secrets/.env
      - source: mongo-root-username
        target: /run/secrets/root/username.txt
      - source: mongo-root-password
        target: /run/secrets/root/password.txt
      - source: mongo-username
        target: /run/secrets/express/username.txt
      - source: mongo-password
        target: /run/secrets/express/password.txt
  mongo-debug:
    container_name: mongo-debug
    restart: on-failure
    image: mongo-express@sha256:1b23d7976f0210dbec74045c209e52fbb26d29b2e873d6c6fa3d3f0ae32c2a64
    secrets:
      - source: mongo-root-username
        target: /run/secrets/root/username.txt
      - source: mongo-root-password
        target: /run/secrets/root/password.txt
      - source: mongo-dev-username
        target: /run/secrets/dev/username.txt
      - source: mongo-dev-password
        target: /run/secrets/dev/password.txt
  onionprobe:
    container_name: onionprobe
    build:
      context: ./onionprobe/onionprobe
      dockerfile: ./containers/onionprobe/Dockerfile
  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3-distroless
    restart: unless-stopped
  grafana:
    container_name: grafana
    image: grafana/grafana-oss:13.0.1-security-01
    restart: unless-stopped
    environment:
      GF_ANALYTICS_REPORTING_ENABLED: false # No anonymous usage statistics
  onionscan:
    container_name: onionscan
    restart: on-failure
    build:
      context: ./onionscan
      dockerfile: ./Dockerfile
      target: onionscan
    secrets:
      - source: tor-hostname
        target: /run/secrets/hostname
  onionscan-ui:
    container_name: onionscan-ui
    restart: on-failure
    build:
      context: ./onionscan
      dockerfile: ./Dockerfile
      target: onionscan
    command: [
      "--verbose",
      "--mode", "analysis"
    ]
  license-report:
    container_name: license-report
    build:
      context: ..
      dockerfile: ./src/license-report/Dockerfile
    # If we have node modules installed, inspect them.
    # If we don't, only inspect package.json
    working_dir: /project/packages/
  container-link:
    build:
      context: ./container-link
      dockerfile: ./Dockerfile
configs:
  mongo-replicas:
    file: ./mongo/replicas.json
secrets:
  tor-hostname:
    file: ./tor/secrets/hostname
  express:
    file: ./express/secrets/
  mongo-config:
    file: ./mongo/secrets/.env
  mongo-keyfile:
    file: ./mongo/secrets/keyFile.pem
  mongo-root-username:
    file: ./mongo/secrets/root/username.txt
  mongo-root-password:
    file: ./mongo/secrets/root/password.txt
  mongo-username:
    file: ./mongo/secrets/express/username.txt
  mongo-password:
    file: ./mongo/secrets/express/password.txt
  mongo-dev-username:
    file: ./mongo/secrets/dev/username.txt
  mongo-dev-password:
    file: ./mongo/secrets/dev/password.txt
