<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            :root {
                color-scheme: light dark;
                --light-mode: initial;
                --dark-mode: ;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --light-mode: ;
                    --dark-mode: initial;
                }
            }
            html {
                --bg_light: white;
                --bg_dark: black;
                --font_light: black;
                --font_dark: white;
            }
            body {
                background-color: var(--light-mode, var(--bg_light)) var(--dark-mode, var(--bg_dark));
                color: var(--light-mode, var(--font_light)) var(--dark-mode, var(--font_dark));
            }
        </style>
        <title>Error</title>
    </head>
    <body>
        <h1>Error <!--@ERROR_CODE--></h1>
        <h2><!--@ERROR_MESSAGE--></h2>
        <p>If you believe this to be an error, contact the website maintainers.</p>
    </body>
</html>
